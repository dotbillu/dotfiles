# Theme
include current-theme.conf

# Font
font_family family="MesloLGL Nerd Font"
bold_font auto
italic_font auto
bold_italic_font auto
font_size 15

# Cursor
cursor_shape beam
cursor_shape_unfocused hollow
cursor_blink_interval 0.4
cursor_stop_blinking_after 5.0
cursor_trail 1
cursor_trail_decay 0.1 0.3
cursor_trail_start_threshold 30

# Scrollback
scrollback_lines 10000
scrollback_pager nvimpager -p
scrollback_pager_history_size 50

# Input & notifications
mouse_hide_wait -10.0
input_delay 0
bell_on_tab "🔔"
notify_on_cmd_finish invisible 10

# Window layout
single_window_margin_width 0
window_padding_width 0
single_window_padding_width 0
hide_window_decorations yes

# Resize behavior
resize_debounce_time 0.1 0.5
resize_in_steps yes

# Tabs
tab_bar_margin_height 0 0
tab_bar_style powerline
tab_bar_filter
tab_fade 0 0 0.5 1
tab_powerline_style round
tab_title_template "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{tab.last_focused_progress_percent}{index}"

# Transparency
background_opacity 0.9
background_blur 1

# Remote control (used by scripts/tools)
allow_remote_control yes

# Quick tab switching
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9
map alt+0 goto_tab 10
