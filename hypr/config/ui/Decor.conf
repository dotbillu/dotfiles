general {
    gaps_in = 0
    gaps_out = 0

    border_size = 1
    float_gaps = 0

   col.active_border = 0xffb4bfe2
   col.inactive_border = $surface0
    resize_on_border = false


    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
       enabled = true
       range = 4
       render_power = 3
       color = rgba(1a1a1aee)
    }

   blur {
      enabled =0  
      size = 1
      passes = 1
      new_optimizations = yes
}
}
