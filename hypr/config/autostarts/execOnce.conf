exec-once=gsettings set org.gnome.desktop.interface gtk-theme "catppuccin-macchiato-flamingo-standard+default"
exec-once = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"  
exec-once=hyprpanel
exec-once = /usr/bin/gnome-keyring-daemon --start --components=pkcs11,secrets,ssh,gpg
exec-once=wayscriber --daemon
exec-once=pypr
exec-once = ~/.local/bin/headset-media
exec-once=bash -c "sleep 5 && kdeconnect-indicator"
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user restart xdg-desktop-portal




