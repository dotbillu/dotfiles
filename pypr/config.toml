[pyprland]
plugins = ["scratchpads"]

[scratchpads.term]
command = "kitty --class scratchterm"
class = "scratchterm"
size = "75% 60%"
animation = "fromTop"


[scratchpads.browser]
command = "firefox-developer-edition --name scratchbrowser --new-instance"
class = "scratchbrowser"
size = "85% 75%"
animation = "fromTop"
